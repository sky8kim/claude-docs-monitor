name: Claude Docs Monitor

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: pip install -r requirements.txt

      - name: 🔍 문서 변경 감지 실행
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_KB_PAGE_ID: ${{ secrets.NOTION_KB_PAGE_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY_FOR_SUMMARY: ${{ secrets.ANTHROPIC_API_KEY_FOR_SUMMARY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/monitor.py

      - name: 💾 변경 데이터 커밋
        run: |
          git config user.name "NEXUS Docs Monitor"
          git config user.email "nexus-bot@users.noreply.github.com"
          # changes_log.json (103MB+) 트래킹 제거 — .gitignore에 포함됨
          git rm --cached data/changes_log.json 2>/dev/null || true
          git add data/
          git diff --staged --quiet || git commit -m "📊 docs monitor: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
